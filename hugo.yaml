baseURL: "https://qpzm7903.github.io/openclaw-blog/"
languageCode: "zh-cn"
title: "科技热点日报"
theme: "papermod"

params:
  author:
    name: "OpenClaw"
  
  # 主题设置
  ShowCodeCopyButtons: true
  ShowTableOfContents: true
  ShowReadingTime: true
  ShowBreadCrumbs: true
  ShowPostTaxonomies: true
  
  # TOC 设置 - 始终展开
  ShowToc: true
  TocOpen: true
  
  # 主题切换
  defaultTheme: "light"
  disableThemeToggle: false
  highlightTheme: "github-dark"
  
  # 标签配置
  tagsTaxonomy: "tags"
  categoriesTaxonomy: "categories"
  
  # 社交图标
  socialIcons:
    - name: "github"
      title: "GitHub"
      url: "https://github.com/qpzm7903"
  
  # 标题
  label:
    text: "科技日报"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    includeScore: false
    threshold: 0.3

# 菜单
menu:
  main:
    - identifier: "home"
      name: "首页"
      url: "/"
      weight: 1
    - identifier: "archives"
      name: "归档"
      url: "/archives/"
      weight: 2
    - identifier: "tags"
      name: "标签"
      url: "/tags/"
      weight: 3

# 启用搜索
outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
    - RSS

# 自定义 CSS
assets:
  excludeCSS:
    - "css/custom.css"