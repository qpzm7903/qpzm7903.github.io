name: 周报
slug: weekly
filename_prefix: weekly-review   # 覆盖默认的 daily-<slug>- 命名
emoji: "🧭"
category: 周报
tags: ["周报", "趋势"]
cadence: weekly-sunday   # 仅每周日生成

sources:
  - name: 本周日报
    url: content/posts/daily-*-YYYY-MM-DD.md
    type: local
    note: 回读过去 7 天本博客发布的全部话题日报（AI/论文/科技/股票），
          不重新抓外部信息源；如需补充细节可回访日报中已有的原文链接。

limits:
  storylines: 5    # 主线故事 3~5 条

structure: |
  ## 🧭 本周主线               ← 3~5 条主线故事，每条：
                                  一句话主线名（如"模型价格战进入第 N 轮"）
                                  + 本周进展（引用本周日报的具体条目并链接）
                                  + 放在近一个月看意味着什么
  ## 📈 值得持续盯的信号        ← 1~3 条刚冒头、下周值得关注的苗头
  ## 📖 本周英语回顾            ← 从本周各日报「今日英语」中挑 5 个最值得
                                  复习的词汇/短语，一行一个：词 + 原句出处

style: |
  - 周报的价值是"趋势感"：日报说"发生了什么"，周报说"正在走向哪"。
  - 主线要跨天串联：把本周多条日报条目串成一条故事线，而不是重新罗列新闻。
  - 主线命名尽量沿用往期周报出现过的名字（回读最近 2~4 篇周报保持连续性），
    同一条故事线的名字不要每周变。
