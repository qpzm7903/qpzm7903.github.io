name: AI
slug: ai
emoji: "🤖"
category: AI日报
tags: ["AI", "日报"]
cadence: daily

sources:
  official:   # 官方博客/仓库，一手信息
    - name: OpenAI Blog
      url: https://openai.com/news/rss.xml
      type: rss
    - name: Anthropic News
      url: https://www.anthropic.com/news
      type: page
    - name: Google AI Blog
      url: https://blog.google/technology/ai/rss/
      type: rss
    - name: DeepSeek
      url: https://api-docs.deepseek.com/news
      type: page
    - name: Meta AI Blog
      url: https://ai.meta.com/blog/
      type: page
    - name: HuggingFace Blog
      url: https://huggingface.co/blog/feed.xml
      type: rss
  official-cn:   # 中国 AI 厂商官方源，一手信息；与海外同等权重
    - name: 通义千问 Qwen Blog
      url: https://qwenlm.github.io/blog/
      type: page
      note: 备用 https://qwen.ai/blog
    - name: 字节 Seed Blog
      url: https://seed.bytedance.com/zh/blog
      type: page
    - name: MiniMax News
      url: https://www.minimax.io/news
      type: page
    - name: 智谱 GLM（GitHub 组织）
      url: https://api.github.com/orgs/zai-org/repos?sort=pushed&per_page=10
      type: api
      note: z.ai 无博客页，以组织仓库近期动态为准
    - name: 月之暗面 Kimi（GitHub 组织）
      url: https://api.github.com/orgs/MoonshotAI/repos?sort=pushed&per_page=10
      type: api
    - name: 腾讯混元（GitHub 组织）
      url: https://api.github.com/orgs/Tencent-Hunyuan/repos?sort=pushed&per_page=10
      type: api
  opensource-trending:   # 开源趋势：star 涨得快的 AI 项目
    - name: GitHub Trending (daily)
      url: https://github.com/trending?since=daily
      type: page
      note: 只收 AI/LLM/agent 相关仓库；给出 star 总数与今日新增
  community:
    - name: Hacker News 高热 AI 帖
      url: https://hn.algolia.com/api/v1/search?tags=front_page
      type: api
      note: 只收 AI 相关且分数较高（>150 points 左右）的帖子
  tool-releases:   # 工具版本小节；用本机已认证的 gh CLI 调用（gh api repos/...）避免匿名限流
    - name: Claude Code Releases
      url: https://api.github.com/repos/anthropics/claude-code/releases?per_page=3
      type: api
    - name: Codex Releases
      url: https://api.github.com/repos/openai/codex/releases?per_page=3
      type: api
    - name: OpenClaw Releases
      url: https://api.github.com/repos/openclaw/openclaw/releases?per_page=3
      type: api
    - name: opencode Releases
      url: https://api.github.com/repos/anomalyco/opencode/releases?per_page=3
      type: api
    - name: pi Releases
      url: https://api.github.com/repos/earendil-works/pi/releases?per_page=3
      type: api
    - name: oh-my-pi (omp) Releases
      url: https://api.github.com/repos/can1357/oh-my-pi/releases?per_page=3
      type: api
    - name: Hermes Agent Releases
      url: https://api.github.com/repos/nousresearch/hermes-agent/releases?per_page=3
      type: api

limits:
  featured: 3      # 精读条目上限
  briefs: 8        # 快讯上限

structure: |
  ## ⭐ 今日最值得关注        ← 精读条目 1~3 条
  ## 📰 快讯                  ← 官方动态 + 社区热点，2~3 句/条
  ## 🚀 开源趋势              ← 0~3 个趋势项目：是什么、为什么火、star 数据
  ## 🔧 工具版本              ← 仅当过去 24h 有新 release 时出现，一行/工具：
                                版本号 + changelog 中值得注意的一两点
  ## 📖 今日英语              ← 必有小节，规则见 PIPELINE.md 通用约定

style: |
  - 中外均衡：中国厂商（DeepSeek/Qwen/GLM/Kimi/字节/MiniMax/混元）的模型发布、
    开源动作与海外大厂同等优先级，精读区不应长期只有海外条目。
  - GitHub Trending 里的中国团队项目照常收录，注明团队背景。
