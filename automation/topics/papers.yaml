name: 论文
slug: papers
emoji: "📄"
category: 论文日报
tags: ["AI", "论文", "日报"]
cadence: daily

sources:
  - name: HuggingFace Daily Papers
    url: https://huggingface.co/api/daily_papers
    type: api
    note: 社区已投票筛选；按 upvotes 排序取前若干篇，需再抓论文页/摘要确认内容

limits:
  featured: 1      # 当天最重要的一篇精讲
  briefs: 2        # 另精讲 2 篇；宁可少而懂，不要多而懵

structure: |
  ## ⭐ 今日必读               ← 1 篇精讲
  ## 📄 也值得了解             ← 2 篇精讲（篇幅略短）
  ## 📖 今日英语               ← 见 PIPELINE.md 通用约定

style: |
  - 读者是论文零基础的普通开发者：没有机器学习背景，看不懂黑话。
  - 每篇论文必须以一段「人话版」开头：用生活化类比讲清"这篇论文在
    解决什么问题、解决了会怎样"，一个不懂 AI 的朋友也能听懂。
  - 之后再讲方法思路和为什么重要；出现任何术语（RL、蒸馏、MoE、
    rollout 等）当场用一两句白话解释，不许甩黑话。
  - 概念卡片联动：每当解释一个会反复出现的重要概念，检查
    content/concepts/ 是否已有该概念的卡片——没有就创建一张
    （规则见 PIPELINE.md「概念库」），日报正文中链接到它；
    已有则直接链接，不重复解释超过一句。
  - 保留论文英文原标题。
