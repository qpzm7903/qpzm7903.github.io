name: 科技
slug: tech
emoji: "🌐"
category: 科技日报
tags: ["科技", "日报"]
cadence: daily

sources:
  - name: Hacker News 首页高分帖
    url: https://hn.algolia.com/api/v1/search?tags=front_page
    type: api
    note: 取高分帖（>200 points 左右）；剔除已被 AI 话题收录的条目
  - name: V2EX 热议
    url: https://www.v2ex.com/api/topics/hot.json
    type: api
    note: 中文社区热榜，角色对标 HN；只收科技/行业实质讨论，
          剔除站务、生活闲聊类主题；条目链接原帖
  - name: The Verge
    url: https://www.theverge.com/rss/index.xml
    type: rss
    note: 只收重大产品/行业新闻，忽略测评和消费导购（Atom 格式，解析注意）
  - name: Ars Technica
    url: https://feeds.arstechnica.com/arstechnica/index
    type: rss
    note: 只收科技行业实质进展
  - name: 中国大厂官方发布（事件驱动）
    type: page
    note: 无固定 RSS。当 HN/V2EX/宏观新闻里出现华为、小米、腾讯、阿里、
          比亚迪等中国公司的重大动态时，回溯其官方 newsroom /
          官方公众号原文作为一手信源，不转述二手编译稿

limits:
  featured: 2
  briefs: 6

structure: |
  ## ⭐ 今日最值得关注        ← 精读条目 1~2 条
  ## 📰 快讯                  ← 2~3 句/条，中外条目混排
  ## 📖 今日英语              ← 必有小节，规则见 PIPELINE.md 通用约定

style: |
  - 与 AI 日报跨话题去重：AI 相关条目归 AI 日报，这里不重复收录。
  - 中外均衡：中国科技动态（硬件、造车、出海、政策）与海外同等优先级；
    V2EX 条目挑信息增量大的，不收纯情绪讨论。
